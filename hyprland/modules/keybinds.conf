# -----------------------------------------------------
# KEYBINDINGS :: TITAN CLUSTER
# -----------------------------------------------------

$mainMod = SUPER

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 1: THE LAUNCHPAD (Top Left: Q-E-R)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, Q, exec, $terminal       # Launch - Terminal
bind = $mainMod, E, exec, $fileManager    # Launch - Explorer
bind = $mainMod, R, exec, $menu           # Launch - App Launcher
bind = $mainMod CTRL, R, exec, $runner   # Launch - Command Runner
bind = $mainMod ALT, code:61, exec, ~/.config/hypr/scripts/keybinds-hint.sh # Launch - Keybind Hints
# bind = , XF86Launch1, exec, rofi -show drun

# W = Wallpaper Selector
bind = $mainMod ALT, W, exec, ~/.config/hypr/scripts/wallpaper-selector.sh # Launch - Wallpaper Selector
# E = Effects Menu
bind = $mainMod ALT, E, exec, ~/.config/hypr/scripts/wallpaper-effects.sh # Launch - Wallpaper Effects

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 2: THE BUCKETS (Home Row Special Workspaces) [TEMPLATE]
#  "Left hand controls the workspace."
#  These are personal mappings for 'Special Workspaces' using Home Row keys.
#  Uncomment and customize in your local user-keybinds.conf if needed.
# ──────────────────────────────────────────────────────────────────────────────
# bind = $mainMod, code:39, togglespecialworkspace, standard        # code:39 = S
# bind = $mainMod SHIFT, code:39, movetoworkspace, special:standard
# 
# bind = $mainMod, code:25, togglespecialworkspace, work            # code:25 = W
# bind = $mainMod SHIFT, code:25, movetoworkspace, special:work
# 
# bind = $mainMod, code:43, togglespecialworkspace, hobby           # code:43 = H
# bind = $mainMod SHIFT, code:43, movetoworkspace, special:hobby
# 
# bind = $mainMod, code:42, togglespecialworkspace, gaming          # code:42 = G
# bind = $mainMod SHIFT, code:42, movetoworkspace, special:gaming
# 
# bind = $mainMod, code:28, togglespecialworkspace, tools           # code:28 = T
# bind = $mainMod SHIFT, code:28, movetoworkspace, special:tools
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 3: WINDOW STATE (Bottom Left: Z-X-C-V)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, C, killactive           # Kill - Active Window
bind = $mainMod, V, togglefloating       # Toggle - Float Mode
bind = $mainMod, F, fullscreen           # Toggle - Fullscreen
bind = $mainMod, P, pseudo               # Toggle - Pseudo Mode
bind = $mainMod, J, layoutmsg, togglesplit # Toggle - Join/Split

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 4: SYSTEM (Protected / Right Hand)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, L, exec, hyprlock          # Lock - System Lock
# [ hardware-trigger ] Power Menu bind moved to host vault
bind = CTRL SHIFT, S, exec, ~/.config/hypr/scripts/screenshot-swappy.sh # Capture - Area Selection
bind = , Print, exec, grim - | wl-copy   # Capture - Full Screen
bind = $mainMod SHIFT, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh # Launch - Clipboard History
bind = $mainMod, N, exec, swaync-client -t -sw  # Toggle - Notifications Center
bind = $mainMod, B, exec, ~/.config/waybar/scripts/power_cycle.sh # Cycle - Waybar Layout
bind = $mainMod ALT, B, exec, ~/.config/hypr/scripts/waybar-switcher.sh  # Launch - UI Switcher
bind = $mainMod SHIFT, E, exec, ~/.config/hypr/scripts/pilot-hydra.py # Launch - Media Hub
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 5: NAVIGATION (Arrows & Standard 1-10)
# ──────────────────────────────────────────────────────────────────────────────
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, code:10, workspace, 1
bind = $mainMod, code:11, workspace, 2
bind = $mainMod, code:12, workspace, 3
bind = $mainMod, code:13, workspace, 4
bind = $mainMod, code:14, workspace, 5
bind = $mainMod, code:15, workspace, 6
bind = $mainMod, code:16, workspace, 7
bind = $mainMod, code:17, workspace, 8
bind = $mainMod, code:18, workspace, 9
bind = $mainMod, code:19, workspace, 10

bind = $mainMod SHIFT, code:10, movetoworkspace, 1
bind = $mainMod SHIFT, code:11, movetoworkspace, 2
bind = $mainMod SHIFT, code:12, movetoworkspace, 3
bind = $mainMod SHIFT, code:13, movetoworkspace, 4
bind = $mainMod SHIFT, code:14, movetoworkspace, 5
bind = $mainMod SHIFT, code:15, movetoworkspace, 6
bind = $mainMod SHIFT, code:16, movetoworkspace, 7
bind = $mainMod SHIFT, code:17, movetoworkspace, 8
bind = $mainMod SHIFT, code:18, movetoworkspace, 9
bind = $mainMod SHIFT, code:19, movetoworkspace, 10

# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 6: EXPANDED WORKSPACES (F1-F12 -> 11-22) [TEMPLATE]
#  Uncomment and customize in your local user-keybinds.conf if needed.
# ──────────────────────────────────────────────────────────────────────────────
# bind = $mainMod, code:67, workspace, 11            # code:67 = F1
# bind = $mainMod, code:68, workspace, 12            # code:68 = F2
# bind = $mainMod, code:69, workspace, 13            # code:69 = F3
# bind = $mainMod, code:70, workspace, 14            # code:70 = F4
# bind = $mainMod, code:71, workspace, 15            # code:71 = F5
# bind = $mainMod, code:72, workspace, 16            # code:72 = F6
# bind = $mainMod, code:73, workspace, 17            # code:73 = F7
# bind = $mainMod, code:74, workspace, 18            # code:74 = F8
# bind = $mainMod, code:75, workspace, 19            # code:75 = F9
# bind = $mainMod, code:76, workspace, 20            # code:76 = F10
# bind = $mainMod, code:95, workspace, 21            # code:95 = F11
# bind = $mainMod, code:96, workspace, 22            # code:96 = F12
# ──────────────────────────────────────────────────────────────────────────────

# [ hardware-trigger ] Media & Audio binds moved to host vault

# Mouse Interaction
bind = $mainMod, mouse_down, workspace, e+1    # Cycle - Next Workspace
bind = $mainMod, mouse_up, workspace, e-1      # Cycle - Previous Workspace
bindm = $mainMod, mouse:272, movewindow        # Drag - Move Window (L-Click)
bindm = $mainMod, mouse:273, resizewindow      # Drag - Resize Window (R-Click)
# ──────────────────────────────────────────────────────────────────────────────
#  CLUSTER 7: USER CUSTOMIZATION
#  Load any host-specific keybinds or overrides here.
# ──────────────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/user-keybinds.conf