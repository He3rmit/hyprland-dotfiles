# -----------------------------------------------------
# VISUALS & ANIMATIONS (Pywal Integrated)
# -----------------------------------------------------

source = ~/.config/hypr/modules/colors.conf

# ──────────────────────────────────────────────────────────────────────────────
#  GENERAL HUD LAYOUT [TEMPLATE]
#  Standard gaps and border behavior. Override in user-visuals.conf.
# ──────────────────────────────────────────────────────────────────────────────
# general {
#     gaps_in = 5
#     gaps_out = 15
#     border_size = 2
# }
    
general {
    col.active_border = $color6 $color4 45deg
    col.inactive_border = $color0
    resize_on_border = true
    allow_tearing = false   # Logic hook for user-windowrules.conf
    layout = dwindle
}

# ──────────────────────────────────────────────────────────────────────────────
#  DECORATION & OPACITY [TEMPLATE]
#  Rounding and transparency levels. Override in user-visuals.conf.
# ──────────────────────────────────────────────────────────────────────────────
# decoration {
#     rounding = 10
#     active_opacity = 0.90
#     inactive_opacity = 0.80
# }

decoration {
    
    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        vibrancy = 0.22
    }

    dim_inactive = false

}

animations {
    enabled = true
    
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    
    animation = windows, 1, 5, overshot, slide
    animation = windowsOut, 1, 4, smoothOut, slide
    animation = windowsMove, 1, 4, default
    animation = border, 1, 10, default
    animation = fade, 1, 10, smoothIn
    animation = fadeDim, 1, 10, smoothIn
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = true
    preserve_split = true
}

# ──────────────────────────────────────────────────────────────────────────────
#  HOST-SPECIFIC TUNING [TEMPLATE]
#  Machine-specific rendering and hardware optimizations (VRR, VFR, Rendering).
#  Uncomment and customize in your local user-visuals.conf.
# ──────────────────────────────────────────────────────────────────────────────
# misc {
#     vfr = true
#     vrr = 0 
# }
# 
# render {
#     direct_scanout = 0
# }

# ──────────────────────────────────────────────────────────────────────────────
#  PERSONAL OVERRIDES
#  Load any host-specific visual tweaks or rendering rules.
# ──────────────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/user-visuals.conf
