# -----------------------------------------------------
# WINDOW RULES
# -----------------------------------------------------

# --- GAME RULES [TEMPLATE] ---
# For niche high-performance gaming (Tearing/Immediate Mode).
# 1. Use 'hyprctl clients' to find the binary class.
# 2. Add 'windowrule = immediate 1, match:class ^(your_game_here)$' below.
# 3. Ensure 'allow_tearing = true' is set in your user-visuals.conf.
# ──────────────────────────────────────────────────────────────────────────────
#  Uncomment and customize in your local user-windowrules.conf.
# ──────────────────────────────────────────────────────────────────────────────
# windowrule = immediate 1, match:class ^(payday2_win32_release.exe)$
# windowrule = immediate 1, match:class ^(steam_app_\d+)$



# --- WORKSPACE RULES ---
# Smart gaps (No gaps when only 1 window)
workspace = w[tv1], gapsout:0, gapsin:0, border:0, rounding:0
workspace = f[1], gapsout:0, gapsin:0, border:0, rounding:0

# --- SPECIAL APPS AUTOMATION [TEMPLATE] ---
# Force specific apps to workspaces or set silent launch rules here.
# Uncomment and customize in your local user-windowrules.conf.
# ──────────────────────────────────────────────────────────────────────────────
# windowrulev2 = workspace special:work, class:^(code-url-handler)$
# windowrulev2 = workspace special:hobby, class:^(Spotify)$

# ──────────────────────────────────────────────────────────────────────────────
#  PERSONAL OVERRIDES
#  Load any host-specific window rules from your personal vault.
# ──────────────────────────────────────────────────────────────────────────────
source = ~/.config/hypr/user-windowrules.conf